<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04050a" />
    <title>Aetherium Manifest</title>
    <link rel="stylesheet" href="./clean-first-surface.css" />
  </head>
  <body>
    <canvas id="manifestation-canvas" aria-hidden="true"></canvas>

    <button
      id="settings-icon-btn"
      class="settings-icon-btn"
      type="button"
      aria-label="Open settings"
      aria-controls="settings-panel"
      aria-expanded="false"
    >
      ⚙
    </button>

    <main class="first-surface" aria-label="Aetherium chat surface">
      <form id="composer" class="composer" aria-label="Chat composer">
        <label class="sr-only" for="intent-input">Message</label>
        <input id="intent-input" name="intent" autocomplete="off" placeholder="พิมพ์ข้อความ" enterkeyhint="send" required />
        <button id="send-btn" type="submit" class="send-btn">Send</button>
      </form>
    </main>

    <script type="module" src="./clean-first-surface.js"></script>
  </body>
</html>
