{{- if .Values.apiGateway.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: aetherium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: {{ .Values.apiGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.apiGateway.autoscaling.maxReplicas }}
  behavior:
{{ toYaml .Values.apiGateway.autoscaling.behavior | indent 4 }}
  metrics:
{{ toYaml .Values.apiGateway.autoscaling.metrics | indent 4 }}
{{- end }}
