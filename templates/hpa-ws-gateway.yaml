{{- if .Values.wsGateway.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ws-gateway-hpa
  namespace: aetherium
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ws-gateway
  minReplicas: {{ .Values.wsGateway.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.wsGateway.autoscaling.maxReplicas }}
  behavior:
{{ toYaml .Values.wsGateway.autoscaling.behavior | indent 4 }}
  metrics:
{{ toYaml .Values.wsGateway.autoscaling.metrics | indent 4 }}
{{- end }}
